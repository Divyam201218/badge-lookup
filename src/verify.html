<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Credential</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>
  <div class="container" style="max-width: 800px; text-align: center; padding-top: 50px;">
    <h1>Credential Verification</h1>
    <h3 id="vName" style="color: var(--accent);"></h3>
    <p id="vDetails"></p>
    
   <div id="pdf-wrapper" style="margin: 0 auto; background: white; text-align: center; max-width: 800px; font-family: system-ui, -apple-system, sans-serif; padding: 40px 20px;">
  
  <canvas id="verifyCanvas" style="box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 8px; margin-bottom: 30px; max-width: 100%;"></canvas>
  
  <div id="pdf-only-meta" class="hidden" style="margin-top: 20px;">
    <h1 id="pdfBadgeName" style="font-size: 32px; color: #111827; margin: 0 0 8px 0;"></h1>
    <h2 style="font-size: 20px; color: #6366f1; margin: 0 0 32px 0; font-weight: 500;">Issued by: AI Student Community</h2>
    
    <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; max-width: 550px; margin: 0 auto; text-align: left; display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      
      <div>
        <p style="margin: 0 0 4px 0; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Issued To (Name)</p>
        <p id="pdfRecipient" style="margin: 0 0 16px 0; font-size: 16px; color: #0f172a; font-weight: 600;"></p>
        
        <p style="margin: 0 0 4px 0; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Issued To (Email)</p>
        <p id="pdfEmail" style="margin: 0; font-size: 16px; color: #0f172a; font-weight: 600; word-break: break-all;"></p>
      </div>
      
      <div>
        <p style="margin: 0 0 4px 0; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Issued On</p>
        <p id="pdfDate" style="margin: 0 0 16px 0; font-size: 16px; color: #0f172a; font-weight: 600;"></p>
        
        <p style="margin: 0 0 4px 0; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Credential ID</p>
        <p id="pdfCredID" style="margin: 0; font-size: 16px; color: #0f172a; font-weight: 600; font-family: monospace;"></p>
      </div>

    </div>
    
    <div style="margin-top: 32px;">
      <p style="margin: 0 0 8px 0; font-size: 14px; color: #64748b;">Verify authenticity at:</p>
      <a id="pdfUrl" style="color: #3b82f6; font-size: 14px; text-decoration: none; font-weight: 500;"></a>
    </div>
  </div>

</div>
    <div style="margin-top: 20px; display: flex; justify-content: center; gap: 10px;">
      <button onclick="downloadPNG()">Download PNG</button>
      <button onclick="downloadPDF()">Download PDF</button>
      <button onclick="addToLinkedIn()" style="background: #0077b5;">Add to LinkedIn</button>
    </div>
  </div>

  <script src="js/renderer.js"></script>
  <script src="js/verify.js"></script>
</body>
</html>
